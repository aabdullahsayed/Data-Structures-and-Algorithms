<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 950" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Segoe Print', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    <path d="M 230 65 Q 450 63 670 66" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 240 71 Q 450 73 660 70" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="450" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a" letter-spacing="1">BIG O NOTATION (COMPLEXITY)</text>

  <g transform="translate(50, 150)">
    
    <g filter="url(#sketchy)">
      
      <path d="M 100 600 L 100 50 Q 300 50 400 600 Z" fill="#fee2e2" opacity="0.5"/>
      <path d="M 100 600 L 400 600 Q 550 400 700 50 L 100 50 Z" fill="#fef9c3" opacity="0.4"/>
      <path d="M 100 600 L 800 600 L 800 50 L 700 50 Q 550 400 100 600 Z" fill="#d1fae5" opacity="0.5"/>

      <path d="M 100 600 L 800 600" fill="none" stroke="#1e293b" stroke-width="4" marker-end="url(#arrow-slate)" stroke-linecap="round"/>
      <path d="M 100 600 L 100 50" fill="none" stroke="#1e293b" stroke-width="4" marker-end="url(#arrow-slate)" stroke-linecap="round"/>

      <path d="M 100 550 L 780 550" fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
      
      <path d="M 100 600 Q 200 480 780 450" fill="none" stroke="#059669" stroke-width="4" stroke-linecap="round"/>
      
      <path d="M 100 600 L 650 100" fill="none" stroke="#eab308" stroke-width="4" stroke-linecap="round"/>
      
      <path d="M 100 600 Q 400 450 550 100" fill="none" stroke="#f97316" stroke-width="4" stroke-linecap="round"/>
      
      <path d="M 100 600 Q 300 550 380 100" fill="none" stroke="#ef4444" stroke-width="4" stroke-linecap="round"/>
      
      <path d="M 100 600 Q 150 500 220 100" fill="none" stroke="#991b1b" stroke-width="4" stroke-linecap="round"/>

    </g>

    <text x="450" y="650" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">Elements / Input Size (N)</text>
    <text x="40" y="350" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a" transform="rotate(-90, 40, 350)">Operations (Time / Space)</text>

    <g font-size="16" font-weight="bold">
      <text x="790" y="555" fill="#10b981" text-anchor="start">O(1)</text>
      <text x="790" y="455" fill="#059669" text-anchor="start">O(log N)</text>
      <text x="660" y="105" fill="#eab308" text-anchor="start">O(N)</text>
      <text x="560" y="105" fill="#f97316" text-anchor="start">O(N log N)</text>
      <text x="360" y="85" fill="#ef4444" text-anchor="start">O(N²)</text>
      <text x="180" y="85" fill="#991b1b" text-anchor="start">O(2ⁿ)</text>
    </g>

    <g transform="translate(600, 200)">
      <g filter="url(#sketchy)">
        <rect x="0" y="0" width="230" height="200" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" stroke-linejoin="round"/>
      </g>
      <text x="15" y="30" font-size="16" font-weight="bold" fill="#0f172a">Real-World Examples:</text>
      
      <text x="15" y="65" font-size="15" font-weight="bold" fill="#10b981">O(1)</text>
      <text x="65" y="65" font-size="14" fill="#475569">Array Indexing</text>
      
      <text x="15" y="95" font-size="15" font-weight="bold" fill="#059669">O(log N)</text>
      <text x="85" y="95" font-size="14" fill="#475569">Binary Search</text>

      <text x="15" y="125" font-size="15" font-weight="bold" fill="#eab308">O(N)</text>
      <text x="65" y="125" font-size="14" fill="#475569">Linear Search</text>

      <text x="15" y="155" font-size="15" font-weight="bold" fill="#f97316">O(N log N)</text>
      <text x="105" y="155" font-size="14" fill="#475569">Merge Sort</text>

      <text x="15" y="185" font-size="15" font-weight="bold" fill="#ef4444">O(N²)</text>
      <text x="75" y="185" font-size="14" fill="#475569">Bubble Sort</text>
    </g>
  </g>

</svg>
