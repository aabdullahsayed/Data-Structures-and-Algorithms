<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 950" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Segoe Print', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    <path d="M 270 65 Q 450 63 630 66" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 280 71 Q 450 73 620 70" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="450" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a" letter-spacing="1">BUBBLE SORT O(N²)</text>

  <text x="50" y="110" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">PASS 1: Bubbling the largest element to the end</text>
  <text x="50" y="130" font-size="14" fill="#64748b">Compare adjacent pairs (Left vs Right)</text>

  <g filter="url(#sketchy)">
    <path d="M 120 220 Q 80 250 120 280" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-slate)" stroke-linecap="round"/>
    <path d="M 120 370 Q 80 400 120 430" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-slate)" stroke-linecap="round"/>
    <path d="M 120 520 Q 80 550 120 580" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-dasharray="6,6" marker-end="url(#arrow-slate)" stroke-linecap="round"/>
  </g>

  <g transform="translate(200, 160)">
    <g filter="url(#sketchy)">
      <g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="50" height="45" rx="3" fill="#fee2e2" stroke="#ef4444" transform="rotate(-1, 25, 22)"/>
        <rect x="60" y="-1" width="50" height="45" rx="3" fill="#fee2e2" stroke="#ef4444" transform="rotate(1, 85, 22)"/>
        <rect x="120" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(-0.5, 145, 22)"/>
        <rect x="180" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(0.5, 205, 22)"/>
      </g>
      
      <path d="M 25 55 Q 55 85 85 55" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" stroke-linecap="round"/>
      <path d="M 85 55 Q 55 85 25 55" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" stroke-linecap="round"/>
    </g>

    <g font-size="18" font-weight="bold" text-anchor="middle">
      <text x="25" y="28" fill="#ef4444">7</text>
      <text x="85" y="28" fill="#ef4444">3</text>
      <text x="145" y="28" fill="#0f172a">9</text>
      <text x="205" y="28" fill="#0f172a">2</text>
    </g>
    
    <text x="300" y="28" font-size="16" font-weight="bold" fill="#ef4444">7 > 3</text>
    <text x="370" y="28" font-size="16" font-weight="bold" fill="#0f172a">Out of order. <tspan fill="#ef4444">SWAP!</tspan></text>
  </g>

  <g transform="translate(200, 310)">
    <g filter="url(#sketchy)">
      <g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(0.5, 25, 22)"/>
        <rect x="60" y="0" width="50" height="45" rx="3" fill="#eff6ff" stroke="#2563eb" transform="rotate(-1, 85, 22)"/>
        <rect x="120" y="0" width="50" height="45" rx="3" fill="#eff6ff" stroke="#2563eb" transform="rotate(0.5, 145, 22)"/>
        <rect x="180" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(-0.5, 205, 22)"/>
      </g>
      <path d="M 95 65 L 110 80 L 140 55" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g font-size="18" font-weight="bold" text-anchor="middle">
      <text x="25" y="28" fill="#0f172a">3</text>
      <text x="85" y="28" fill="#2563eb">7</text>
      <text x="145" y="28" fill="#2563eb">9</text>
      <text x="205" y="28" fill="#0f172a">2</text>
    </g>

    <text x="300" y="28" font-size="16" font-weight="bold" fill="#2563eb">7 &lt; 9</text>
    <text x="370" y="28" font-size="16" font-weight="bold" fill="#0f172a">Correct order. <tspan fill="#2563eb">LEAVE IT.</tspan></text>
  </g>

  <g transform="translate(200, 460)">
    <g filter="url(#sketchy)">
      <g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(-1, 25, 22)"/>
        <rect x="60" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(0.5, 85, 22)"/>
        <rect x="120" y="0" width="50" height="45" rx="3" fill="#fee2e2" stroke="#ef4444" transform="rotate(-0.5, 145, 22)"/>
        <rect x="180" y="0" width="50" height="45" rx="3" fill="#fee2e2" stroke="#ef4444" transform="rotate(1, 205, 22)"/>
      </g>
      
      <path d="M 145 55 Q 175 85 205 55" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" stroke-linecap="round"/>
      <path d="M 205 55 Q 175 85 145 55" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)" stroke-linecap="round"/>
    </g>

    <g font-size="18" font-weight="bold" text-anchor="middle">
      <text x="25" y="28" fill="#0f172a">3</text>
      <text x="85" y="28" fill="#0f172a">7</text>
      <text x="145" y="28" fill="#ef4444">9</text>
      <text x="205" y="28" fill="#ef4444">2</text>
    </g>

    <text x="300" y="28" font-size="16" font-weight="bold" fill="#ef4444">9 > 2</text>
    <text x="370" y="28" font-size="16" font-weight="bold" fill="#0f172a">Out of order. <tspan fill="#ef4444">SWAP!</tspan></text>
  </g>

  <g transform="translate(200, 610)">
    <g filter="url(#sketchy)">
      <g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(0.5, 25, 22)"/>
        <rect x="60" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(-1, 85, 22)"/>
        <rect x="120" y="0" width="50" height="45" rx="3" fill="#ffffff" stroke="#1e293b" transform="rotate(0.5, 145, 22)"/>
        
        <rect x="180" y="-3" width="50" height="51" rx="4" fill="#d1fae5" stroke="#10b981" stroke-width="3" stroke-dasharray="6,4" transform="rotate(-1, 205, 22)"/>
      </g>
      <path d="M 195 -10 Q 205 -20 215 -10 L 215 -3" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g font-size="18" font-weight="bold" text-anchor="middle">
      <text x="25" y="28" fill="#0f172a">3</text>
      <text x="85" y="28" fill="#0f172a">7</text>
      <text x="145" y="28" fill="#0f172a">2</text>
      <text x="205" y="28" fill="#059669">9</text>
    </g>

    <text x="300" y="28" font-size="16" font-weight="bold" fill="#10b981">End of Pass 1</text>
    <text x="430" y="28" font-size="16" font-weight="bold" fill="#0f172a">The largest element is <tspan fill="#10b981">SORTED.</tspan></text>
  </g>

  <g transform="translate(150, 750)">
    <g filter="url(#sketchy)">
      <rect x="0" y="0" width="600" height="120" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
    
    <text x="20" y="15" font-size="16" font-weight="bold" fill="#0f172a" text-anchor="start">Bubble Sort Mechanics:</text>
    
    <text x="20" y="50" font-size="15" fill="#334155"><tspan font-weight="bold" fill="#0f172a">1. Iterations:</tspan> We repeat this entire process N times.</text>
    <text x="20" y="75" font-size="15" fill="#334155"><tspan font-weight="bold" fill="#0f172a">2. Optimization:</tspan> On pass 2, we don't need to check the last element anymore!</text>
    <text x="20" y="100" font-size="15" fill="#334155"><tspan font-weight="bold" fill="#0f172a">3. Short Circuit:</tspan> If we do a full pass with ZERO swaps, the array is sorted early.</text>
  </g>

</svg>
