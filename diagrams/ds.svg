<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#1e293b" />
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a" letter-spacing="1">DATA STRUCTURES ARCHITECTURE</text>
    <line x1="280" y1="55" x2="620" y2="55" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="280" y1="60" x2="620" y2="60" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

    <text x="50" y="100" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">01 // LINEAR STRUCTURES</text>

    <g transform="translate(50, 140)">
      <text x="0" y="-12" font-size="14" font-weight="bold" fill="#1e293b">Array (Contiguous Memory)</text>
      <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="45" height="40" rx="3"/>
        <rect x="45" y="0" width="45" height="40" rx="3"/>
        <rect x="90" y="0" width="45" height="40" rx="3"/>
        <rect x="135" y="0" width="45" height="40" rx="3"/>
        <rect x="180" y="0" width="45" height="40" rx="3"/>
      </g>
      <g font-size="12" fill="#64748b" text-anchor="middle">
        <text x="22.5" y="58">0x00</text>
        <text x="67.5" y="58">0x01</text>
        <text x="112.5" y="58">0x02</text>
        <text x="157.5" y="58">0x03</text>
        <text x="202.5" y="58">0x04</text>
      </g>
      <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
        <text x="22.5" y="25">10</text>
        <text x="67.5" y="25">20</text>
        <text x="112.5" y="25">30</text>
        <text x="157.5" y="25">40</text>
        <text x="202.5" y="25">50</text>
      </g>
    </g>

    <g transform="translate(370, 110)">
      <text x="30" y="-12" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Stack (LIFO)</text>
      <path d="M 0 0 L 0 100 L 60 100 L 60 0" fill="none" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <g stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="5" y="70" width="50" height="25" rx="4" fill="#f8fafc"/>
        <rect x="5" y="40" width="50" height="25" rx="4" fill="#f8fafc"/>
        <rect x="5" y="10" width="50" height="25" rx="4" fill="#eff6ff" stroke="#2563eb"/>
      </g>
      <path d="M -25 20 Q -10 5 15 5" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
      <text x="-40" y="25" font-size="13" font-weight="bold" fill="#2563eb">Push</text>
      <path d="M 45 5 Q 70 5 85 20" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
      <text x="90" y="25" font-size="13" font-weight="bold" fill="#2563eb">Pop</text>
    </g>

    <g transform="translate(50, 260)">
      <text x="0" y="-12" font-size="14" font-weight="bold" fill="#1e293b">Linked List (Nodes &amp; Pointers)</text>
      <rect x="0" y="0" width="55" height="32" rx="4" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
      <rect x="55" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
      <text x="27.5" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Head</text>
      <line x1="65" y1="16" x2="105" y2="16" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="115" y="0" width="55" height="32" rx="4" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
      <rect x="170" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
      <text x="142.5" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Data</text>
      <line x1="180" y1="16" x2="220" y2="16" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

      <rect x="230" y="0" width="55" height="32" rx="4" fill="#ffffff" stroke="#1e293b" stroke-width="2"/>
      <rect x="285" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#1e293b" stroke-width="2"/>
      <text x="257.5" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#0f172a">Tail</text>
      <line x1="295" y1="16" x2="335" y2="16" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
      <text x="350" y="20" text-anchor="middle" font-size="13" fill="#64748b">NULL</text>
    </g>

    <g transform="translate(560, 230)">
      <text x="90" y="-12" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Queue (FIFO)</text>
      <line x1="20" y1="0" x2="160" y2="0" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="42" x2="160" y2="42" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>
      <g stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="30" y="6" width="30" height="30" rx="4" fill="#eff6ff" stroke="#2563eb"/>
        <rect x="70" y="6" width="30" height="30" rx="4" fill="#f8fafc"/>
        <rect x="110" y="6" width="30" height="30" stroke-dasharray="4,4" fill="none" stroke="#64748b"/>
      </g>

      <line x1="190" y1="21" x2="150" y2="21" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
      <text x="180" y="10" font-size="13" font-weight="bold" fill="#2563eb">Enqueue</text>

      <line x1="30" y1="21" x2="-10" y2="21" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-accent)"/>
      <text x="-30" y="10" font-size="13" font-weight="bold" fill="#2563eb">Dequeue</text>
    </g>

    <line x1="50" y1="360" x2="850" y2="360" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="8,6"/>

    <text x="50" y="410" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">02 // NON-LINEAR STRUCTURES</text>

    <g transform="translate(150, 460)">
      <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Binary Tree</text>
      <g stroke="#64748b" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="10" x2="-40" y2="50"/>
        <line x1="0" y1="10" x2="40" y2="50"/>
        <line x1="-40" y1="50" x2="-65" y2="90"/>
        <line x1="-40" y1="50" x2="-15" y2="90"/>
        <line x1="40" y1="50" x2="15" y2="90"/>
        <line x1="40" y1="50" x2="65" y2="90"/>
      </g>
      <g fill="#ffffff" stroke="#1e293b" stroke-width="2">
        <circle cx="0" cy="10" r="15" fill="#f1f5f9"/>
        <circle cx="-40" cy="50" r="15"/>
        <circle cx="40" cy="50" r="15"/>
        <circle cx="-65" cy="90" r="15"/>
        <circle cx="-15" cy="90" r="15"/>
        <circle cx="15" cy="90" r="15"/>
        <circle cx="65" cy="90" r="15"/>
      </g>
    </g>

    <g transform="translate(450, 460)">
      <text x="0" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Graph (Vertices &amp; Edges)</text>
      <g stroke="#64748b" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="10" x2="-45" y2="60"/>
        <line x1="0" y1="10" x2="45" y2="60"/>
        <line x1="-45" y1="60" x2="45" y2="60"/>
        <line x1="-45" y1="60" x2="-20" y2="120"/>
        <line x1="45" y1="60" x2="20" y2="120"/>
        <line x1="-20" y1="120" x2="20" y2="120"/>
        <line x1="0" y1="10" x2="-20" y2="120" stroke-dasharray="6,4"/>
      </g>
      <g fill="#ffffff" stroke="#1e293b" stroke-width="2">
        <circle cx="0" cy="10" r="15"/>
        <circle cx="-45" cy="60" r="15"/>
        <circle cx="45" cy="60" r="15"/>
        <circle cx="-20" cy="120" r="15"/>
        <circle cx="20" cy="120" r="15"/>
      </g>
    </g>

    <g transform="translate(750, 460)">
      <text x="10" y="-20" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">Trie (Prefix Storage)</text>
      <g stroke="#64748b" stroke-width="2" stroke-linecap="round">
        <line x1="0" y1="10" x2="-30" y2="50"/>
        <line x1="0" y1="10" x2="30" y2="50"/>
        <line x1="-30" y1="50" x2="-30" y2="90"/>
        <line x1="30" y1="50" x2="10" y2="90"/>
        <line x1="30" y1="50" x2="50" y2="90"/>
      </g>
      <g stroke="#1e293b" stroke-width="2">
        <circle cx="0" cy="10" r="15" fill="#f8fafc"/>
        <text x="0" y="15" text-anchor="middle" font-size="13" fill="#0f172a" stroke="none">root</text>

        <circle cx="-30" cy="50" r="15" fill="#ffffff"/>
        <text x="-30" y="55" text-anchor="middle" font-size="14" fill="#0f172a" stroke="none">a</text>

        <circle cx="30" cy="50" r="15" fill="#ffffff"/>
        <text x="30" y="55" text-anchor="middle" font-size="14" fill="#0f172a" stroke="none">b</text>

        <circle cx="-30" cy="90" r="15" fill="#1e293b"/>
        <text x="-30" y="95" text-anchor="middle" font-size="14" fill="#ffffff" stroke="none">p</text>

        <circle cx="10" cy="90" r="15" fill="#1e293b"/>
        <text x="10" y="95" text-anchor="middle" font-size="14" fill="#ffffff" stroke="none">a</text>

        <circle cx="50" cy="90" r="15" fill="#1e293b"/>
        <text x="50" y="95" text-anchor="middle" font-size="14" fill="#ffffff" stroke="none">e</text>
      </g>
    </g>

  </g>
</svg>
