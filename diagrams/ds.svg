<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
  </defs>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" letter-spacing="1">DATA STRUCTURES ARCHITECTURE</text>
  <line x1="300" y1="55" x2="600" y2="55" stroke="#e2e8f0" stroke-width="2"/>

  <text x="50" y="100" font-size="14" font-weight="600" fill="#475569" letter-spacing="1.5">01 // LINEAR STRUCTURES</text>

  <g transform="translate(50, 140)">
    <text x="0" y="-12" font-size="13" font-weight="500" fill="#334155">Array (Contiguous Memory)</text>
    <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
      <rect x="0" y="0" width="45" height="40" rx="2"/>
      <rect x="45" y="0" width="45" height="40" rx="2"/>
      <rect x="90" y="0" width="45" height="40" rx="2"/>
      <rect x="135" y="0" width="45" height="40" rx="2"/>
      <rect x="180" y="0" width="45" height="40" rx="2"/>
    </g>
    <g font-size="11" fill="#94a3b8" text-anchor="middle" font-family="monospace">
      <text x="22.5" y="55">0x00</text>
      <text x="67.5" y="55">0x01</text>
      <text x="112.5" y="55">0x02</text>
      <text x="157.5" y="55">0x03</text>
      <text x="202.5" y="55">0x04</text>
    </g>
    <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
      <text x="22.5" y="25">10</text>
      <text x="67.5" y="25">20</text>
      <text x="112.5" y="25">30</text>
      <text x="157.5" y="25">40</text>
      <text x="202.5" y="25">50</text>
    </g>
  </g>

  <g transform="translate(370, 110)">
    <text x="30" y="-12" font-size="13" font-weight="500" fill="#334155">Stack (LIFO)</text>
    <path d="M 0 0 L 0 100 L 60 100 L 60 0" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#334155" stroke-width="1.5">
      <rect x="5" y="70" width="50" height="25" rx="3" fill="#f8fafc"/>
      <rect x="5" y="40" width="50" height="25" rx="3" fill="#f8fafc"/>
      <rect x="5" y="10" width="50" height="25" rx="3" fill="#e0f2fe" stroke="#2563eb"/>
    </g>
    <path d="M -25 20 Q -10 5 15 5" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
    <text x="-40" y="25" font-size="12" font-weight="600" fill="#2563eb">Push</text>
    <path d="M 45 5 Q 70 5 85 20" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
    <text x="90" y="25" font-size="12" font-weight="600" fill="#2563eb">Pop</text>
  </g>

  <g transform="translate(50, 260)">
    <text x="0" y="-12" font-size="13" font-weight="500" fill="#334155">Linked List (Nodes &amp; Pointers)</text>
    <rect x="0" y="0" width="55" height="32" rx="3" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    <rect x="55" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
    <text x="27.5" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">Head</text>
    <line x1="65" y1="16" x2="105" y2="16" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    
    <rect x="115" y="0" width="55" height="32" rx="3" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    <rect x="170" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
    <text x="142.5" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">Data</text>
    <line x1="180" y1="16" x2="220" y2="16" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    
    <rect x="230" y="0" width="55" height="32" rx="3" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    <rect x="285" y="0" width="20" height="32" rx="0" fill="#f1f5f9" stroke="#334155" stroke-width="1.5"/>
    <text x="257.5" y="20" text-anchor="middle" font-size="13" font-weight="500" fill="#0f172a">Tail</text>
    <line x1="295" y1="16" x2="335" y2="16" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="350" y="20" text-anchor="middle" font-size="12" font-family="monospace" fill="#94a3b8">NULL</text>
  </g>

  <g transform="translate(560, 230)">
    <text x="0" y="-12" font-size="13" font-weight="500" fill="#334155">Queue (FIFO)</text>
    <line x1="20" y1="0" x2="160" y2="0" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="42" x2="160" y2="42" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <g stroke="#334155" stroke-width="1.5">
      <rect x="30" y="6" width="30" height="30" rx="3" fill="#e0f2fe" stroke="#2563eb"/>
      <rect x="70" y="6" width="30" height="30" rx="3" fill="#f8fafc"/>
      <rect x="110" y="6" width="30" height="30" stroke-dasharray="3,3" fill="none" stroke="#94a3b8"/>
    </g>
    
    <line x1="190" y1="21" x2="150" y2="21" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
    <text x="180" y="10" font-size="12" font-weight="600" fill="#2563eb">Enqueue</text>
    
    <line x1="30" y1="21" x2="-10" y2="21" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-accent)"/>
    <text x="-30" y="10" font-size="12" font-weight="600" fill="#2563eb">Dequeue</text>
  </g>

  <line x1="50" y1="360" x2="850" y2="360" stroke="#f1f5f9" stroke-width="2"/>

  <text x="50" y="410" font-size="14" font-weight="600" fill="#475569" letter-spacing="1.5">02 // NON-LINEAR STRUCTURES</text>

  <g transform="translate(150, 460)">
    <text x="-40" y="-20" font-size="13" font-weight="500" fill="#334155">Binary Tree</text>
    <g stroke="#94a3b8" stroke-width="1.5">
      <line x1="0" y1="10" x2="-40" y2="50"/>
      <line x1="0" y1="10" x2="40" y2="50"/>
      <line x1="-40" y1="50" x2="-65" y2="90"/>
      <line x1="-40" y1="50" x2="-15" y2="90"/>
      <line x1="40" y1="50" x2="15" y2="90"/>
      <line x1="40" y1="50" x2="65" y2="90"/>
    </g>
    <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
      <circle cx="0" cy="10" r="14" fill="#e2e8f0"/> <circle cx="-40" cy="50" r="14"/>
      <circle cx="40" cy="50" r="14"/>
      <circle cx="-65" cy="90" r="14"/>
      <circle cx="-15" cy="90" r="14"/>
      <circle cx="15" cy="90" r="14"/>
      <circle cx="65" cy="90" r="14"/>
    </g>
  </g>

  <g transform="translate(450, 460)">
    <text x="-30" y="-20" font-size="13" font-weight="500" fill="#334155">Graph (Vertices &amp; Edges)</text>
    <g stroke="#94a3b8" stroke-width="1.5">
      <line x1="0" y1="10" x2="-45" y2="60"/>
      <line x1="0" y1="10" x2="45" y2="60"/>
      <line x1="-45" y1="60" x2="45" y2="60"/>
      <line x1="-45" y1="60" x2="-20" y2="120"/>
      <line x1="45" y1="60" x2="20" y2="120"/>
      <line x1="-20" y1="120" x2="20" y2="120"/>
      <line x1="0" y1="10" x2="-20" y2="120" stroke-dasharray="4,4"/>
    </g>
    <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
      <circle cx="0" cy="10" r="14"/>
      <circle cx="-45" cy="60" r="14"/>
      <circle cx="45" cy="60" r="14"/>
      <circle cx="-20" cy="120" r="14"/>
      <circle cx="20" cy="120" r="14"/>
    </g>
  </g>

  <g transform="translate(750, 460)">
    <text x="-40" y="-20" font-size="13" font-weight="500" fill="#334155">Trie (Prefix Storage)</text>
    <g stroke="#94a3b8" stroke-width="1.5">
      <line x1="0" y1="10" x2="-30" y2="50"/>
      <line x1="0" y1="10" x2="30" y2="50"/>
      <line x1="-30" y1="50" x2="-30" y2="90"/>
      <line x1="30" y1="50" x2="10" y2="90"/>
      <line x1="30" y1="50" x2="50" y2="90"/>
    </g>
    <g stroke="#334155" stroke-width="1.5">
      <circle cx="0" cy="10" r="14" fill="#f8fafc"/>
      <text x="0" y="14" text-anchor="middle" font-size="12" font-family="monospace">root</text>
      
      <circle cx="-30" cy="50" r="14" fill="#ffffff"/>
      <text x="-30" y="54" text-anchor="middle" font-size="12" font-family="monospace" fill="#0f172a">a</text>
      
      <circle cx="30" cy="50" r="14" fill="#ffffff"/>
      <text x="30" y="54" text-anchor="middle" font-size="12" font-family="monospace" fill="#0f172a">b</text>
      
      <circle cx="-30" cy="90" r="14" fill="#334155"/>
      <text x="-30" y="94" text-anchor="middle" font-size="12" font-family="monospace" fill="#ffffff">p</text>

      <circle cx="10" cy="90" r="14" fill="#334155"/>
      <text x="10" y="94" text-anchor="middle" font-size="12" font-family="monospace" fill="#ffffff">a</text>

      <circle cx="50" cy="90" r="14" fill="#334155"/>
      <text x="50" y="94" text-anchor="middle" font-size="12" font-family="monospace" fill="#ffffff">e</text>
    </g>
  </g>

</svg>
