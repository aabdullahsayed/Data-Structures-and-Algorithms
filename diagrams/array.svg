<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    
    <text x="450" y="45" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a" letter-spacing="1">ARRAY OPERATIONS MECHANICS</text>
    <line x1="240" y1="65" x2="660" y2="65" stroke="#cbd5e1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="245" y1="70" x2="655" y2="70" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>

    <g transform="translate(50, 120)">
      <text x="0" y="-15" font-size="16" font-weight="bold" fill="#1e293b" letter-spacing="1">01 // TRAVERSE &amp; DISPLAY</text>
      <text x="0" y="5" font-size="13" fill="#475569">Sequential memory access (O(N) Time)</text>
      
      <g transform="translate(0, 45)">
        <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="50" height="40" rx="3"/>
          <rect x="50" y="0" width="50" height="40" rx="3"/>
          <rect x="100" y="0" width="50" height="40" rx="3"/>
          <rect x="150" y="0" width="50" height="40" rx="3"/>
          <rect x="200" y="0" width="50" height="40" rx="3"/>
        </g>
        <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
          <text x="25" y="26">10</text>
          <text x="75" y="26">20</text>
          <text x="125" y="26">30</text>
          <text x="175" y="26">40</text>
          <text x="225" y="26">50</text>
        </g>
        <path d="M 25 55 Q 50 75 75 55" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
        <path d="M 75 55 Q 100 75 125 55" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
        <path d="M 125 55 Q 150 75 175 55" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
        <path d="M 175 55 Q 200 75 225 55" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
        <text x="125" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">for(i = 0; i &lt; n; i++)</text>
      </g>
    </g>

    <g transform="translate(480, 120)">
      <text x="0" y="-15" font-size="16" font-weight="bold" fill="#1e293b" letter-spacing="1">02 // SEARCH</text>
      <text x="0" y="5" font-size="13" fill="#475569">Finding a specific value by value or index</text>
      
      <g transform="translate(0, 45)">
        <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="50" height="40" rx="3"/>
          <rect x="50" y="0" width="50" height="40" rx="3"/>
          <rect x="100" y="0" width="50" height="40" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/> 
          <rect x="150" y="0" width="50" height="40" rx="3"/>
          <rect x="200" y="0" width="50" height="40" rx="3"/>
        </g>
        <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
          <text x="25" y="26">12</text>
          <text x="75" y="26">45</text>
          <text x="125" y="26" fill="#2563eb">89</text>
          <text x="175" y="26">23</text>
          <text x="225" y="26">67</text>
        </g>
        <g font-size="13" fill="#64748b" text-anchor="middle">
          <text x="25" y="60">0</text>
          <text x="75" y="60">1</text>
          <text x="125" y="60" fill="#2563eb" font-weight="bold">2</text>
          <text x="175" y="60">3</text>
          <text x="225" y="60">4</text>
        </g>
        <path d="M 125 -15 L 125 -5" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" stroke-linecap="round"/>
        <text x="125" y="-22" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">Target Found</text>
      </g>
    </g>

    <line x1="50" y1="300" x2="850" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,8"/>

    <g transform="translate(50, 360)">
      <text x="0" y="-15" font-size="16" font-weight="bold" fill="#1e293b" letter-spacing="1">03 // INSERTION</text>
      <text x="0" y="5" font-size="13" fill="#475569">Requires right-shifting subsequent elements (O(N) Time)</text>
      
      <g transform="translate(0, 65)">
        <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="50" height="40" rx="3"/>
          <rect x="50" y="0" width="50" height="40" rx="3"/>
          <rect x="100" y="0" width="50" height="40" rx="3" stroke="#10b981" stroke-dasharray="6,4" fill="#d1fae5"/>
          <rect x="150" y="0" width="50" height="40" rx="3"/>
          <rect x="200" y="0" width="50" height="40" rx="3"/>
          <rect x="250" y="0" width="50" height="40" rx="3" stroke-dasharray="5,4" stroke="#64748b" fill="#f8fafc"/>
        </g>
        
        <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
          <text x="25" y="26">A</text>
          <text x="75" y="26">B</text>
          <text x="175" y="26" fill="#64748b">C</text>
          <text x="225" y="26" fill="#64748b">D</text>
        </g>

        <path d="M 125 55 Q 150 75 175 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <path d="M 175 55 Q 200 75 225 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <path d="M 225 55 Q 250 75 275 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <text x="200" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Shift Right</text>

        <rect x="100" y="-50" width="50" height="30" rx="4" fill="#10b981" stroke="#059669" stroke-width="2" stroke-linejoin="round"/>
        <text x="125" y="-28" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">X</text>
        <path d="M 125 -20 L 125 -5" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrow-green)" stroke-linecap="round"/>
        <text x="165" y="-28" font-size="13" font-weight="bold" fill="#10b981">Insert at Index 2</text>
      </g>
    </g>

    <g transform="translate(480, 360)">
      <text x="0" y="-15" font-size="16" font-weight="bold" fill="#1e293b" letter-spacing="1">04 // DELETION</text>
      <text x="0" y="5" font-size="13" fill="#475569">Requires left-shifting to close memory gaps (O(N) Time)</text>
      
      <g transform="translate(0, 65)">
        <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="50" height="40" rx="3"/>
          <rect x="50" y="0" width="50" height="40" rx="3" stroke="#ef4444" stroke-dasharray="6,4" fill="#fee2e2"/>
          <rect x="100" y="0" width="50" height="40" rx="3"/>
          <rect x="150" y="0" width="50" height="40" rx="3"/>
          <rect x="200" y="0" width="50" height="40" rx="3"/>
        </g>
        
        <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
          <text x="25" y="26">8</text>
          <text x="125" y="26" fill="#64748b">2</text>
          <text x="175" y="26" fill="#64748b">9</text>
          <text x="225" y="26" fill="#64748b">5</text>
        </g>

        <text x="75" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#ef4444">4</text>
        <line x1="60" y1="20" x2="90" y2="20" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

        <path d="M 75 -10 L 75 -25" stroke="#ef4444" stroke-width="2.5" marker-end="url(#arrow-red)" stroke-linecap="round"/>
        <text x="75" y="-35" text-anchor="middle" font-size="13" font-weight="bold" fill="#ef4444">Remove</text>

        <path d="M 125 55 Q 100 75 75 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <path d="M 175 55 Q 150 75 125 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <path d="M 225 55 Q 200 75 175 55" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow-slate)"/>
        <text x="150" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#475569">Shift Left</text>
      </g>
    </g>

    <line x1="50" y1="540" x2="850" y2="540" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-dasharray="8,8"/>

    <g transform="translate(50, 590)">
      <text x="0" y="-15" font-size="16" font-weight="bold" fill="#1e293b" letter-spacing="1">05 // UPDATE</text>
      <text x="0" y="5" font-size="13" fill="#475569">Direct memory overwrite via index access (O(1) Time)</text>
      
      <g transform="translate(0, 60)">
        <g fill="#ffffff" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="0" width="50" height="40" rx="3"/>
          <rect x="50" y="0" width="50" height="40" rx="3"/>
          <rect x="100" y="0" width="50" height="40" rx="3"/>
          <rect x="150" y="0" width="50" height="40" rx="3" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
          <rect x="200" y="0" width="50" height="40" rx="3"/>
        </g>
        
        <g font-size="15" font-weight="bold" fill="#0f172a" text-anchor="middle">
          <text x="25" y="26">J</text>
          <text x="75" y="26">A</text>
          <text x="125" y="26">V</text>
          <text x="175" y="26" fill="#64748b">E</text> 
          <text x="225" y="26">!</text>
        </g>
        
        <line x1="160" y1="20" x2="190" y2="20" stroke="#64748b" stroke-width="2.5" stroke-linecap="round"/>

        <text x="175" y="-22" text-anchor="middle" font-size="18" font-weight="bold" fill="#2563eb">A</text>
        <path d="M 175 -15 L 175 -5" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" stroke-linecap="round"/>
        <text x="175" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#2563eb">arr[3] = 'A'</text>
      </g>
    </g>

    <g transform="translate(480, 590)">
      <rect x="0" y="-30" width="370" height="110" rx="6" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" stroke-linejoin="round"/>
      <text x="15" y="-5" font-size="15" font-weight="bold" fill="#0f172a">Key Takeaways for Arrays:</text>
      
      <path d="M 18 13 Q 20 10 22 13 Q 24 16 20 17 Q 16 16 18 13" fill="#3b82f6" stroke="#2563eb" stroke-width="1.5"/>
      <text x="35" y="20" font-size="13" fill="#334155"><tspan font-weight="bold" fill="#0f172a">Fast Access (O(1)):</tspan> Fetching/updating data by index.</text>
      
      <path d="M 18 33 Q 20 30 22 33 Q 24 36 20 37 Q 16 36 18 33" fill="#ef4444" stroke="#dc2626" stroke-width="1.5"/>
      <text x="35" y="40" font-size="13" fill="#334155"><tspan font-weight="bold" fill="#0f172a">Slow Mutations (O(N)):</tspan> Inserts and deletes force shifts.</text>

      <path d="M 18 53 Q 20 50 22 53 Q 24 56 20 57 Q 16 56 18 53" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
      <text x="35" y="60" font-size="13" fill="#334155"><tspan font-weight="bold" fill="#0f172a">Memory:</tspan> Stored contiguously; strict sizing rules.</text>
    </g>

  </g>
</svg>
