<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981" />
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#64748b" />
    </marker>
  </defs>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="600" fill="#0f172a" letter-spacing="1">ARRAY OPERATIONS MECHANICS</text>
  <line x1="250" y1="65" x2="650" y2="65" stroke="#e2e8f0" stroke-width="2"/>

  <g transform="translate(50, 120)">
    <text x="0" y="-15" font-size="14" font-weight="600" fill="#334155" letter-spacing="1">01 // TRAVERSE &amp; DISPLAY</text>
    <text x="0" y="5" font-size="12" fill="#64748b">Sequential memory access (O(N) Time)</text>
    
    <g transform="translate(0, 30)">
      <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
        <rect x="0" y="0" width="50" height="40" rx="2"/>
        <rect x="50" y="0" width="50" height="40" rx="2"/>
        <rect x="100" y="0" width="50" height="40" rx="2"/>
        <rect x="150" y="0" width="50" height="40" rx="2"/>
        <rect x="200" y="0" width="50" height="40" rx="2"/>
      </g>
      <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
        <text x="25" y="25">10</text>
        <text x="75" y="25">20</text>
        <text x="125" y="25">30</text>
        <text x="175" y="25">40</text>
        <text x="225" y="25">50</text>
      </g>
      <path d="M 25 55 Q 50 75 75 55" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
      <path d="M 75 55 Q 100 75 125 55" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
      <path d="M 125 55 Q 150 75 175 55" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
      <path d="M 175 55 Q 200 75 225 55" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow-blue)"/>
      <text x="125" y="85" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb" font-family="monospace">for(i = 0; i &lt; n; i++)</text>
    </g>
  </g>

  <g transform="translate(480, 120)">
    <text x="0" y="-15" font-size="14" font-weight="600" fill="#334155" letter-spacing="1">02 // SEARCH</text>
    <text x="0" y="5" font-size="12" fill="#64748b">Finding a specific value by value or index</text>
    
    <g transform="translate(0, 30)">
      <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
        <rect x="0" y="0" width="50" height="40" rx="2"/>
        <rect x="50" y="0" width="50" height="40" rx="2"/>
        <rect x="100" y="0" width="50" height="40" rx="2" fill="#e0f2fe" stroke="#2563eb" stroke-width="2"/> <rect x="150" y="0" width="50" height="40" rx="2"/>
        <rect x="200" y="0" width="50" height="40" rx="2"/>
      </g>
      <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
        <text x="25" y="25">12</text>
        <text x="75" y="25">45</text>
        <text x="125" y="25" fill="#2563eb" font-weight="700">89</text>
        <text x="175" y="25">23</text>
        <text x="225" y="25">67</text>
      </g>
      <g font-size="11" fill="#94a3b8" text-anchor="middle" font-family="monospace">
        <text x="25" y="55">0</text>
        <text x="75" y="55">1</text>
        <text x="125" y="55" fill="#2563eb" font-weight="bold">2</text>
        <text x="175" y="55">3</text>
        <text x="225" y="55">4</text>
      </g>
      <path d="M 125 -15 L 125 -5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
      <text x="125" y="-22" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">Target Found</text>
    </g>
  </g>

  <line x1="50" y1="280" x2="850" y2="280" stroke="#f1f5f9" stroke-width="2"/>

  <g transform="translate(50, 330)">
    <text x="0" y="-15" font-size="14" font-weight="600" fill="#334155" letter-spacing="1">03 // INSERTION</text>
    <text x="0" y="5" font-size="12" fill="#64748b">Requires right-shifting subsequent elements (O(N) Time)</text>
    
    <g transform="translate(0, 50)">
      <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
        <rect x="0" y="0" width="50" height="40" rx="2"/>
        <rect x="50" y="0" width="50" height="40" rx="2"/>
        <rect x="100" y="0" width="50" height="40" rx="2" stroke="#10b981" stroke-dasharray="4,4" fill="#d1fae5"/>
        <rect x="150" y="0" width="50" height="40" rx="2"/>
        <rect x="200" y="0" width="50" height="40" rx="2"/>
        <rect x="250" y="0" width="50" height="40" rx="2" stroke-dasharray="3,3" stroke="#94a3b8" fill="#f8fafc"/>
      </g>
      
      <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
        <text x="25" y="25">A</text>
        <text x="75" y="25">B</text>
        <text x="175" y="25" fill="#64748b">C</text>
        <text x="225" y="25" fill="#64748b">D</text>
      </g>

      <path d="M 125 55 Q 150 70 175 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <path d="M 175 55 Q 200 70 225 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <path d="M 225 55 Q 250 70 275 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <text x="200" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Shift Right</text>

      <rect x="100" y="-45" width="50" height="30" rx="2" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
      <text x="125" y="-25" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">X</text>
      <path d="M 125 -15 L 125 -5" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
      <text x="165" y="-25" font-size="11" font-weight="600" fill="#10b981">Insert at Index 2</text>
    </g>
  </g>

  <g transform="translate(480, 330)">
    <text x="0" y="-15" font-size="14" font-weight="600" fill="#334155" letter-spacing="1">04 // DELETION</text>
    <text x="0" y="5" font-size="12" fill="#64748b">Requires left-shifting to close memory gaps (O(N) Time)</text>
    
    <g transform="translate(0, 50)">
      <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
        <rect x="0" y="0" width="50" height="40" rx="2"/>
        <rect x="50" y="0" width="50" height="40" rx="2" stroke="#ef4444" stroke-dasharray="4,4" fill="#fee2e2"/>
        <rect x="100" y="0" width="50" height="40" rx="2"/>
        <rect x="150" y="0" width="50" height="40" rx="2"/>
        <rect x="200" y="0" width="50" height="40" rx="2"/>
      </g>
      
      <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
        <text x="25" y="25">8</text>
        <text x="125" y="25" fill="#64748b">2</text>
        <text x="175" y="25" fill="#64748b">9</text>
        <text x="225" y="25" fill="#64748b">5</text>
      </g>

      <text x="75" y="25" text-anchor="middle" font-size="14" font-weight="bold" fill="#ef4444" text-decoration="line-through">4</text>
      <path d="M 75 -5 L 75 -20" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
      <text x="75" y="-30" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">Remove</text>

      <path d="M 125 55 Q 100 70 75 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <path d="M 175 55 Q 150 70 125 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <path d="M 225 55 Q 200 70 175 55" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)"/>
      <text x="150" y="85" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Shift Left</text>
    </g>
  </g>

  <line x1="50" y1="500" x2="850" y2="500" stroke="#f1f5f9" stroke-width="2"/>

  <g transform="translate(50, 540)">
    <text x="0" y="-15" font-size="14" font-weight="600" fill="#334155" letter-spacing="1">05 // UPDATE</text>
    <text x="0" y="5" font-size="12" fill="#64748b">Direct memory overwrite via index access (O(1) Constant Time)</text>
    
    <g transform="translate(0, 50)">
      <g fill="#ffffff" stroke="#334155" stroke-width="1.5">
        <rect x="0" y="0" width="50" height="40" rx="2"/>
        <rect x="50" y="0" width="50" height="40" rx="2"/>
        <rect x="100" y="0" width="50" height="40" rx="2"/>
        <rect x="150" y="0" width="50" height="40" rx="2" fill="#e0f2fe" stroke="#2563eb"/>
        <rect x="200" y="0" width="50" height="40" rx="2"/>
      </g>
      
      <g font-size="14" font-weight="500" fill="#0f172a" text-anchor="middle">
        <text x="25" y="25">J</text>
        <text x="75" y="25">A</text>
        <text x="125" y="25">V</text>
        <text x="175" y="25" fill="#94a3b8" text-decoration="line-through">E</text> <text x="225" y="25">!</text>
      </g>

      <text x="175" y="-20" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">A</text>
      <path d="M 175 -15 L 175 -5" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
      <text x="175" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb" font-family="monospace">arr[3] = 'A'</text>
    </g>
  </g>

  <g transform="translate(480, 540)">
     <rect x="0" y="-30" width="370" height="110" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
     <text x="15" y="-5" font-size="13" font-weight="600" fill="#0f172a">Key Takeaways for Arrays:</text>
     
     <circle cx="20" cy="15" r="4" fill="#3b82f6"/>
     <text x="35" y="20" font-size="12" fill="#475569"><tspan font-weight="600" fill="#0f172a">Fast Access (O(1)):</tspan> Fetching or updating data by index is instant.</text>
     
     <circle cx="20" cy="35" r="4" fill="#ef4444"/>
     <text x="35" y="40" font-size="12" fill="#475569"><tspan font-weight="600" fill="#0f172a">Slow Mutations (O(N)):</tspan> Inserts and deletes force shifting.</text>

     <circle cx="20" cy="55" r="4" fill="#10b981"/>
     <text x="35" y="60" font-size="12" fill="#475569"><tspan font-weight="600" fill="#0f172a">Memory:</tspan> Stored in contiguous blocks; strict sizing rules.</text>
  </g>

</svg>
