<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1000" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Segoe Print', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow-slate" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#475569" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="22" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    <path d="M 280 65 Q 450 63 620 66" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 290 71 Q 450 73 610 70" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="450" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a" letter-spacing="1">GRAPH DATA STRUCTURE</text>

  <g transform="translate(0, 100)">
    <text x="50" y="30" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">01 // UNDIRECTED GRAPH</text>
    <text x="50" y="55" font-size="15" fill="#64748b">Relationships are mutual and two-way.</text>

    <g filter="url(#sketchy)" stroke-linecap="round" stroke-linejoin="round">
      <g fill="none" stroke="#475569" stroke-width="2.5">
        <path d="M 120 160 Q 210 120 300 130" /> <path d="M 120 160 Q 150 210 180 260" /> <path d="M 300 130 Q 320 180 340 230" /> <path d="M 180 260 Q 260 250 340 230" /> <path d="M 300 130 Q 240 190 180 260" /> </g>

      <g fill="#ffffff" stroke="#1e293b" stroke-width="2.5">
        <circle cx="120" cy="160" r="25"/>
        <circle cx="300" cy="130" r="25"/>
        <circle cx="180" cy="260" r="25"/>
        <circle cx="340" cy="230" r="25"/>
      </g>
    </g>

    <g font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">
      <text x="120" y="166">A</text>
      <text x="300" y="136">B</text>
      <text x="180" y="266">C</text>
      <text x="340" y="236">D</text>
    </g>

    <g transform="translate(450, 160)">
      <text x="0" y="0" font-size="16" font-weight="bold" fill="#0f172a">Real-World Analogy:</text>
      <text x="0" y="25" font-size="16" font-weight="bold" fill="#2563eb">Facebook Friends</text>
      <text x="0" y="55" font-size="15" fill="#475569">If Node A is friends with Node B,</text>
      <text x="0" y="75" font-size="15" fill="#475569">then Node B is inherently friends</text>
      <text x="0" y="95" font-size="15" fill="#475569">with Node A. The connection goes</text>
      <text x="0" y="115" font-size="15" fill="#475569">both ways automatically.</text>
    </g>
  </g>

  <g filter="url(#sketchy)">
    <path d="M 40 430 Q 450 425 860 432" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round"/>
  </g>

  <g transform="translate(0, 410)">
    <text x="50" y="60" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">02 // DIRECTED GRAPH (Digraph)</text>
    <text x="50" y="85" font-size="15" fill="#64748b">Relationships are one-way streets. Direction matters.</text>

    <g filter="url(#sketchy)" stroke-linecap="round" stroke-linejoin="round">
      <g fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)">
        <path d="M 120 160 Q 210 120 300 130" /> <path d="M 120 160 Q 150 210 180 260" /> <path d="M 340 230 Q 320 180 300 130" /> <path d="M 180 260 Q 260 250 340 230" /> </g>
      
      <path d="M 300 130 Q 260 170 180 260" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#arrow-red)"/>

      <g fill="#eff6ff" stroke="#2563eb" stroke-width="2.5">
        <circle cx="120" cy="160" r="25"/>
        <circle cx="300" cy="130" r="25"/>
        <circle cx="180" cy="260" r="25"/>
        <circle cx="340" cy="230" r="25"/>
      </g>
    </g>

    <g font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">
      <text x="120" y="166">1</text>
      <text x="300" y="136">2</text>
      <text x="180" y="266">3</text>
      <text x="340" y="236">4</text>
    </g>

    <g transform="translate(450, 160)">
      <text x="0" y="0" font-size="16" font-weight="bold" fill="#0f172a">Real-World Analogy:</text>
      <text x="0" y="25" font-size="16" font-weight="bold" fill="#2563eb">Twitter / Instagram Followers</text>
      <text x="0" y="55" font-size="15" fill="#475569">Node 1 follows Node 2, but Node 2</text>
      <text x="0" y="75" font-size="15" fill="#475569">does not follow back. Information</text>
      <text x="0" y="95" font-size="15" fill="#475569">only flows in the direction of</text>
      <text x="0" y="115" font-size="15" fill="#475569">the arrows.</text>
    </g>
  </g>

  <g filter="url(#sketchy)">
    <path d="M 40 730 Q 450 725 860 732" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round"/>
  </g>

  <g transform="translate(0, 710)">
    <text x="50" y="60" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">03 // WEIGHTED GRAPH</text>
    <text x="50" y="85" font-size="15" fill="#64748b">Edges carry a cost, distance, or capacity.</text>

    <g filter="url(#sketchy)" stroke-linecap="round" stroke-linejoin="round">
      <g fill="none" stroke="#475569" stroke-width="2.5">
        <path d="M 120 160 L 300 130" /> <path d="M 120 160 L 180 260" /> <path d="M 300 130 L 360 230" /> <path d="M 180 260 L 360 230" /> </g>

      <g fill="#d1fae5" stroke="#10b981" stroke-width="2.5">
        <circle cx="120" cy="160" r="28"/>
        <circle cx="300" cy="130" r="28"/>
        <circle cx="180" cy="260" r="28"/>
        <circle cx="360" cy="230" r="28"/>
      </g>
      
      <g fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5">
        <rect x="185" y="125" width="40" height="20" rx="4"/>
        <rect x="125" y="200" width="40" height="20" rx="4"/>
        <rect x="315" y="170" width="45" height="20" rx="4"/>
        <rect x="250" y="235" width="45" height="20" rx="4"/>
      </g>
    </g>

    <g font-size="13" font-weight="bold" fill="#10b981" text-anchor="middle">
      <text x="205" y="140">790</text>
      <text x="145" y="215">1280</text>
      <text x="337" y="185">2010</text>
      <text x="272" y="250">2730</text>
    </g>

    <g font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">
      <text x="120" y="165">NY</text>
      <text x="300" y="135">CHI</text>
      <text x="180" y="265">MIA</text>
      <text x="360" y="235">LA</text>
    </g>

    <g transform="translate(450, 160)">
      <text x="0" y="0" font-size="16" font-weight="bold" fill="#0f172a">Real-World Analogy:</text>
      <text x="0" y="25" font-size="16" font-weight="bold" fill="#10b981">GPS Navigation (Google Maps)</text>
      <text x="0" y="55" font-size="15" fill="#475569">The numbers represent the distance</text>
      <text x="0" y="75" font-size="15" fill="#475569">(or travel time) between nodes.</text>
      <text x="0" y="95" font-size="15" fill="#475569">Algorithms like Dijkstra's use these</text>
      <text x="0" y="115" font-size="15" fill="#475569">weights to find the shortest path.</text>
    </g>
  </g>

</svg>
