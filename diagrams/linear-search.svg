<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Comic Sans MS', 'Chalkboard SE', 'Comic Neue', 'Segoe Print', cursive, sans-serif;">
  <defs>
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.035" numOctaves="3" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#2563eb" />
    </marker>
  </defs>

  <g filter="url(#sketchy)">
    <path d="M 270 65 Q 450 63 630 66" fill="none" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round"/>
    <path d="M 280 71 Q 450 73 620 70" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="450" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#0f172a" letter-spacing="1">LINEAR SEARCH O(N)</text>

  <text x="50" y="120" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">Target Value: <tspan fill="#2563eb">23</tspan></text>

  <g transform="translate(50, 160)">
    
    <g filter="url(#sketchy)">
      <g stroke="#1e293b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="0" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(-1, 30, 25)"/>
        <rect x="65" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(0.5, 95, 25)"/>
        <rect x="130" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(-0.5, 160, 25)"/>
        <rect x="195" y="-2" width="60" height="54" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="3" transform="rotate(1, 225, 25)"/>
        <rect x="260" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(-1, 290, 25)"/>
        <rect x="325" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(0.5, 355, 25)"/>
        <rect x="390" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(0.5, 420, 25)"/>
        <rect x="455" y="0" width="60" height="50" rx="3" fill="#ffffff" transform="rotate(-0.5, 485, 25)"/>
      </g>
      
      <path d="M 225 -25 Q 220 -15 225 -8" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)" stroke-linecap="round"/>
      
      <path d="M 30 55 Q 62 85 95 55" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round"/>
      <path d="M 95 55 Q 127 85 160 55" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round"/>
      <path d="M 160 55 Q 192 85 225 55" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,5" stroke-linecap="round"/>
    </g>

    <g font-size="18" font-weight="bold" fill="#0f172a" text-anchor="middle">
      <text x="30" y="32">12</text>
      <text x="95" y="32">45</text>
      <text x="160" y="32">89</text>
      <text x="225" y="32" fill="#2563eb">23</text>
      <text x="290" y="32">67</text>
      <text x="355" y="32">34</text>
      <text x="420" y="32">90</text>
      <text x="485" y="32">15</text>
    </g>
    
    <g font-size="14" fill="#64748b" text-anchor="middle">
      <text x="30" y="75">0</text>
      <text x="95" y="75">1</text>
      <text x="160" y="75">2</text>
      <text x="225" y="75" font-weight="bold" fill="#2563eb">3</text>
      <text x="290" y="75">4</text>
      <text x="355" y="75">5</text>
      <text x="420" y="75">6</text>
      <text x="485" y="75">7</text>
    </g>

    <text x="225" y="-35" text-anchor="middle" font-size="16" font-weight="bold" fill="#2563eb">Current (i)</text>
    
  </g>

  <g filter="url(#sketchy)">
    <path d="M 40 330 Q 450 325 860 332" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="10,8" stroke-linecap="round"/>
  </g>

  <g transform="translate(50, 380)">
    <text x="0" y="0" font-size="16" font-weight="bold" fill="#334155" letter-spacing="1">SEARCH LOG:</text>
    
    <g filter="url(#sketchy)">
      <path d="M 0 15 Q 400 10 800 15 L 798 160 Q 400 165 2 155 Z" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" stroke-linejoin="round"/>
      
      <line x1="20" y1="33" x2="320" y2="33" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="58" x2="320" y2="58" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="83" x2="320" y2="83" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    </g>

    <text x="25" y="40" font-size="16" fill="#64748b">Checking index 0: Is 12 == 23? (No)</text>
    <text x="25" y="65" font-size="16" fill="#64748b">Checking index 1: Is 45 == 23? (No)</text>
    <text x="25" y="90" font-size="16" fill="#64748b">Checking index 2: Is 89 == 23? (No)</text>
    <text x="25" y="115" font-size="16" font-weight="bold" fill="#2563eb">Checking index 3: Is 23 == 23? (YES!)</text>
    <text x="25" y="145" font-size="16" font-weight="bold" fill="#10b981">Match found at index 3. Returning index.</text>
  </g>

</svg>
